services:
  db:
    image: postgres:18-alpine
    container_name: forum_db
    environment:
      POSTGRES_DB: forum_db
      POSTGRES_USER: forumuser
      POSTGRES_PASSWORD: forumpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: forum_app
    hostname: glassfish-server
    depends_on:
      - db
    ports:
      - "8080:8080" # Web
      - "4848:4848" # Admin Console
    environment:
      - DB_HOST=db
      - DB_NAME=forum_db
      - DB_USER=forumuser
      - DB_PASSWORD=forumpass

volumes:
  postgres_data: